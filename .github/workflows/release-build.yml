name: Build Release Bundles

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: Optional version to publish as a tag/release (for example 1.9.1 or v1.9.1). Leave empty to only build artifacts.
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' && inputs.version != ''
      && format('Build and release {0}', inputs.version)
      || github.event_name == 'workflow_dispatch'
      && 'Build artifacts (manual)'
      || format('Build release bundles for {0}', github.ref_name)
  }}

jobs:
  build-tauri:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            prepare_cmd: node scripts/prepare-tauri-bundled-binary.mjs --target aarch64-apple-darwin
            build_cmd: cargo tauri build --config src-tauri/tauri.conf.json --bundles dmg --target aarch64-apple-darwin
            postprocess_cmd: bash scripts/postprocess-macos-dmg.sh src-tauri/target/aarch64-apple-darwin/release/bundle/dmg lich13studio
            artifact_name: macos-dmg-arm64
            artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - label: Windows x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            prepare_cmd: node scripts/prepare-tauri-bundled-binary.mjs --target x86_64-pc-windows-msvc
            build_cmd: cargo tauri build --config src-tauri/tauri.conf.json --bundles nsis --target x86_64-pc-windows-msvc
            postprocess_cmd: ''
            artifact_name: windows-exe-x64
            artifact_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - label: Windows arm64
            os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            prepare_cmd: node scripts/prepare-tauri-bundled-binary.mjs --target aarch64-pc-windows-msvc
            build_cmd: cargo tauri build --config src-tauri/tauri.conf.json --bundles nsis --target aarch64-pc-windows-msvc
            postprocess_cmd: ''
            artifact_name: windows-exe-arm64
            artifact_path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve app version
        id: app_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            RAW_VERSION="${{ inputs.version }}"
          else
            RAW_VERSION="$(python3 -c "import json; print(json.load(open('package.json', 'r', encoding='utf-8'))['version'])")"
          fi

          RAW_VERSION="${RAW_VERSION//[[:space:]]/}"
          APP_VERSION="${RAW_VERSION#v}"

          if [[ -z "${APP_VERSION}" ]]; then
            echo "Failed to resolve app version." >&2
            exit 1
          fi

          echo "version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version
        run: node scripts/set-app-version.mjs --version "${{ steps.app_version.outputs.version }}"

      - name: Prepare bundled binary
        run: ${{ matrix.prepare_cmd }}

      - name: Build renderer bundle
        run: pnpm build:tauri:web

      - name: Build Tauri bundle (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=2
          attempt=1

          while true; do
            echo "macOS bundle attempt ${attempt}/${max_attempts}"

            if eval "${{ matrix.build_cmd }}"; then
              break
            fi

            if [[ "${attempt}" -ge "${max_attempts}" ]]; then
              echo "macOS bundle failed after ${attempt} attempts" >&2
              exit 1
            fi

            echo "Cleaning bundle output before retry..."
            rm -rf "src-tauri/target/${{ matrix.rust_target }}/release/bundle"
            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Build Tauri bundle
        if: ${{ !startsWith(matrix.os, 'macos') }}
        run: ${{ matrix.build_cmd }}

      - name: Postprocess macOS DMG
        if: ${{ matrix.postprocess_cmd != '' }}
        run: ${{ matrix.postprocess_cmd }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          compression-level: 0

  publish-release:
    name: Publish GitHub Release
    needs: [build-tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Normalize release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="${{ inputs.version }}"
            RAW_VERSION="${RAW_VERSION//[[:space:]]/}"
            if [[ -z "${RAW_VERSION}" ]]; then
              echo "Manual release requires a version input." >&2
              exit 1
            fi
            if [[ "${RAW_VERSION}" == v* ]]; then
              TAG_NAME="${RAW_VERSION}"
            else
              TAG_NAME="v${RAW_VERSION}"
            fi
          fi
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t release_files < <(find release-assets -maxdepth 1 -type f \( -name '*.exe' -o -name '*.dmg' \) | sort)

          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No release assets found." >&2
            exit 1
          fi

          TAG_NAME="${{ steps.tag.outputs.tag_name }}"

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            RELEASE_ID="$(gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json id -q '.id')"
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
              -f target_commitish="${GITHUB_SHA}" \
              -F generate_release_notes=true >/dev/null
            gh release upload "${TAG_NAME}" "${release_files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create \
              "${TAG_NAME}" \
              "${release_files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --generate-notes
          fi
