<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src blob: *; script-src 'self' 'unsafe-eval' 'unsafe-inline' *; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' *; font-src 'self' data: *; img-src 'self' data: file: * blob:; media-src 'self' file:; frame-src * file:" />
    <title>lich13studio</title>
    <link rel="icon" href="/src/assets/images/logo.png" />

    <style>
      html,
      body {
        margin: 0;
      }

      #spinner {
        position: fixed;
        width: 100vw;
        height: 100vh;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        display: flex;
      }

      #spinner img {
        width: 100px;
        border-radius: 50px;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="spinner">
      <img src="/src/assets/images/logo.png" />
    </div>
    <script>
      console.time('init')
      window.electron =
        window.electron ||
        ({
          process: { platform: navigator.userAgent.includes('Mac') ? 'darwin' : navigator.userAgent.includes('Windows') ? 'win32' : 'linux', env: { NODE_ENV: 'production' } },
          ipcRenderer: {
            on: () => () => {},
            once: () => () => {},
            invoke: async () => null,
            send: () => undefined,
            removeAllListeners: () => undefined
          }
        })
      window.api =
        window.api ||
        ({
          file: {
            read: async (id) => localStorage.getItem(`file:${id}`) || '[]',
            writeWithId: async (id, content) => {
              localStorage.setItem(`file:${id}`, content)
              return true
            }
          },
          backup: {},
          mcp: {},
          config: {},
          trace: {},
          windowControls: {},
          window: {},
          system: {},
          searchService: {}
        })
    </script>
    <script type="module" src="/src/tauri-shim.ts"></script>
    <script type="module" src="/src/init.ts"></script>
    <script type="module" src="/src/entryPoint.tsx"></script>
  </body>
</html>
